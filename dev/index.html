<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Voice Consultant</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>AI Consultant</h1>
        <div class="status-indicator">
          <span class="status-dot" id="connection-dot"></span>
          <span id="connection-status">Disconnected</span>
        </div>
      </header>
      
      <main class="chat-container">
        <div id="chat-history" class="chat-history">
          <div class="message system-message">
            <p>Welcome! Click the microphone button to start speaking with your AI Consultant.</p>
          </div>
        </div>
      </main>

      <footer class="controls">
        <button id="mic-button" class="mic-button" disabled>
          <svg class="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
      </footer>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
